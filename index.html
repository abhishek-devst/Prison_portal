<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prisons & Correctional Services, Jharkhand — Portal Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1A1D1B;
  --ink-soft:#4B5048;
  --paper:#F7F5EF;
  --paper-deep:#EFEBE0;
  --line:#DCD6C6;
  --forest:#1B4332;
  --forest-deep:#0F2A20;
  --forest-mist:#E7EEE9;
  --rust:#B5572B;
  --rust-deep:#8F441F;
  --rust-mist:#F5E4D8;
  --iron:#21241F;
  --iron-soft:#2E322B;
  --teal:#2F6F62;
  --amber:#B8841F;
  --red:#A23B2E;
  --white:#FFFFFF;
  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  --radius:3px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--paper);
  font-size:16px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
img,svg{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
ul{margin:0;padding:0;list-style:none;}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;font-weight:600;letter-spacing:-0.01em;}
p{margin:0;}
:focus-visible{outline:3px solid var(--rust);outline-offset:2px;}
.skip-link{position:absolute;left:-999px;top:0;background:var(--forest);color:var(--white);padding:10px 18px;z-index:999;border-radius:0 0 4px 0;}
.skip-link:focus{left:0;}

/* ===== layout helpers ===== */
.wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
.grid{display:grid;gap:24px;}
.eyebrow{
  display:flex;align-items:center;gap:12px;
  font-family:var(--font-mono);font-size:11.5px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--rust-deep);font-weight:600;margin-bottom:10px;
}
.bars{display:flex;align-items:flex-end;gap:3px;height:14px;}
.bars span{width:2.5px;background:var(--rust);display:block;}
.bars span:nth-child(1){height:60%;}
.bars span:nth-child(2){height:100%;}
.bars span:nth-child(3){height:40%;}
.bars span:nth-child(4){height:80%;}
.bars span:nth-child(5){height:55%;}
.section{padding:64px 0;}
.section-tight{padding:40px 0;}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:34px;flex-wrap:wrap;}
.section-head h2{font-size:30px;}
.section-sub{color:var(--ink-soft);font-size:15px;max-width:520px;margin-top:6px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 20px;border-radius:var(--radius);font-weight:600;font-size:14px;
  border:1.5px solid transparent;transition:all .15s ease;white-space:nowrap;
}
.btn-primary{background:var(--forest);color:var(--white);}
.btn-primary:hover{background:var(--forest-deep);}
.btn-rust{background:var(--rust);color:var(--white);}
.btn-rust:hover{background:var(--rust-deep);}
.btn-line{background:transparent;border-color:var(--ink);color:var(--ink);}
.btn-line:hover{background:var(--ink);color:var(--white);}
.btn-line-light{background:transparent;border-color:rgba(255,255,255,.5);color:var(--white);}
.btn-line-light:hover{background:rgba(255,255,255,.12);border-color:var(--white);}
.btn-sm{padding:7px 13px;font-size:12.5px;}
.btn-ghost{background:transparent;color:var(--forest);padding:7px 10px;font-size:13px;}
.btn-ghost:hover{background:var(--forest-mist);}
.tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;padding:4px 9px;border-radius:20px;font-weight:600;}
.tag-green{background:var(--forest-mist);color:var(--forest);}
.tag-amber{background:#FBF0DD;color:var(--amber);}
.tag-rust{background:var(--rust-mist);color:var(--rust-deep);}
.tag-red{background:#F6E3DF;color:var(--red);}
.tag-grey{background:#ECE9DF;color:var(--ink-soft);}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);}
.hr{height:1px;background:var(--line);border:0;margin:0;}
.icon{width:18px;height:18px;flex-shrink:0;}
.proto-badge{
  position:fixed;bottom:18px;right:18px;z-index:500;
  background:var(--iron);color:#E9E5D6;font-family:var(--font-mono);font-size:11px;
  padding:9px 14px;border-radius:30px;display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);letter-spacing:.04em;
}
.proto-badge span.dot{width:7px;height:7px;border-radius:50%;background:#E7A33E;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@media (prefers-reduced-motion: reduce){.proto-badge span.dot{animation:none;}}

/* ===== gov utility bar ===== */
.gov-bar{background:var(--iron);color:#C9C5B6;font-size:12.5px;}
.gov-bar .wrap{display:flex;justify-content:space-between;align-items:center;height:34px;}
.gov-bar a{opacity:.85;}
.gov-bar a:hover{opacity:1;text-decoration:underline;}
.gov-bar-left{display:flex;gap:18px;}
.gov-bar-right{display:flex;gap:6px;align-items:center;}
.util-btn{background:transparent;border:1px solid #45493F;color:#C9C5B6;border-radius:3px;padding:2px 8px;font-size:11.5px;font-family:var(--font-mono);}
.util-btn:hover{border-color:#7B8170;color:#fff;}

/* ===== public header/nav ===== */
.site-header{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:200;}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:84px;gap:24px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:46px;height:46px;flex-shrink:0;}
.brand-text .b1{font-family:var(--font-display);font-size:17px;font-weight:600;line-height:1.15;}
.brand-text .b2{font-size:11.5px;color:var(--ink-soft);letter-spacing:.02em;}
.main-nav{display:flex;align-items:center;gap:2px;}
.main-nav button{background:transparent;border:0;padding:10px 14px;font-size:14px;font-weight:600;color:var(--ink-soft);border-radius:var(--radius);}
.main-nav button:hover{color:var(--forest);background:var(--forest-mist);}
.main-nav button.active{color:var(--forest);background:var(--forest-mist);}
.header-actions{display:flex;gap:10px;align-items:center;}
.mobile-toggle{display:none;background:transparent;border:1.5px solid var(--ink);border-radius:4px;padding:8px;}
@media (max-width:980px){
  .main-nav{display:none;}
  .mobile-toggle{display:flex;}
  .header-actions .btn span.hide-mobile{display:none;}
}

/* ===== hero ===== */
.hero{background:var(--forest);color:var(--white);position:relative;overflow:hidden;}
.hero::before{
  content:"";position:absolute;inset:0;
  background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.045) 0 2px, transparent 2px 64px);
  pointer-events:none;
}
.hero-inner{padding:78px 0 70px;position:relative;}
.hero-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:50px;align-items:center;}
.hero h1{font-size:46px;line-height:1.08;color:var(--white);max-width:560px;}
.hero h1 em{font-style:italic;color:#E7A33E;}
.hero p.lede{color:#D9E3DC;font-size:16.5px;margin-top:18px;max-width:480px;}
.hero-cta{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.18);border-radius:6px;overflow:hidden;margin-top:34px;max-width:480px;}
.hero-stats div{background:var(--forest-deep);padding:18px 20px;}
.hero-stats .num{font-family:var(--font-mono);font-size:25px;font-weight:600;color:#E7A33E;}
.hero-stats .lab{font-size:12px;color:#B9C4BD;margin-top:3px;}
.hero-panel{background:var(--forest-deep);border:1px solid rgba(255,255,255,.14);border-radius:6px;padding:26px;}
.hero-panel h3{color:var(--white);font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.hero-panel .item{display:flex;gap:12px;padding:12px 0;border-top:1px solid rgba(255,255,255,.12);}
.hero-panel .item:first-of-type{border-top:0;padding-top:0;}
.hero-panel .item .d{font-family:var(--font-mono);font-size:11px;color:#E7A33E;width:46px;flex-shrink:0;padding-top:2px;}
.hero-panel .item p{font-size:13.5px;color:#D9E3DC;}
@media (max-width:900px){.hero-grid{grid-template-columns:1fr;}.hero h1{font-size:34px;}}

/* ===== content blocks ===== */
.quick-links{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:-46px;position:relative;z-index:10;}
.ql-card{background:var(--white);border:1px solid var(--line);border-radius:6px;padding:22px;box-shadow:0 12px 28px rgba(20,20,15,.08);transition:transform .15s ease;}
.ql-card:hover{transform:translateY(-3px);border-color:var(--rust);}
.ql-card .icon{color:var(--rust);width:24px;height:24px;margin-bottom:14px;}
.ql-card h4{font-size:15px;margin-bottom:5px;}
.ql-card p{font-size:13px;color:var(--ink-soft);}
@media (max-width:900px){.quick-links{grid-template-columns:1fr 1fr;margin-top:24px;}}

.news-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:0;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.news-feature{padding:30px;border-right:1px solid var(--line);}
.news-feature .tag{margin-bottom:14px;}
.news-feature h3{font-size:22px;margin-bottom:10px;}
.news-feature p{color:var(--ink-soft);font-size:14.5px;}
.news-list .row{display:flex;gap:14px;padding:18px 24px;border-bottom:1px solid var(--line);}
.news-list .row:last-child{border-bottom:0;}
.news-list .date{font-family:var(--font-mono);font-size:11px;color:var(--rust-deep);width:54px;flex-shrink:0;padding-top:2px;}
.news-list h5{font-size:14px;margin-bottom:4px;}
.news-list p{font-size:12.5px;color:var(--ink-soft);}
@media (max-width:900px){.news-grid{grid-template-columns:1fr;}.news-feature{border-right:0;border-bottom:1px solid var(--line);}}

.jail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media (max-width:980px){.jail-grid{grid-template-columns:1fr 1fr;}}
@media (max-width:680px){.jail-grid{grid-template-columns:1fr;}}
.jail-card{border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--white);transition:box-shadow .15s ease, transform .15s ease;cursor:pointer;}
.jail-card:hover{box-shadow:0 10px 24px rgba(20,20,15,.1);transform:translateY(-2px);border-color:var(--forest);}
.jail-card .swatch{height:90px;background:linear-gradient(135deg,var(--forest),var(--forest-deep));position:relative;}
.jail-card .swatch .ico{position:absolute;right:14px;bottom:-16px;width:42px;height:42px;background:var(--rust);border-radius:8px;display:flex;align-items:center;justify-content:center;border:3px solid var(--white);}
.jail-card .swatch .ico svg{width:20px;height:20px;color:var(--white);}
.jail-card .body{padding:18px 18px 18px;}
.jail-card .type{font-family:var(--font-mono);font-size:10.5px;color:var(--rust-deep);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.jail-card h4{font-size:16px;margin-bottom:8px;line-height:1.3;}
.jail-card .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:11px;margin-top:11px;}

.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;align-items:center;}
.filter-row input, .filter-row select{
  border:1.5px solid var(--line);border-radius:4px;padding:10px 13px;font-family:inherit;font-size:14px;background:var(--white);
}
.filter-row input{flex:1;min-width:200px;}
.search-wrap{position:relative;flex:1;min-width:220px;}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-soft);}
.search-wrap input{padding-left:36px;width:100%;}

.detail-hero{background:var(--forest-deep);color:var(--white);padding:46px 0 40px;}
.detail-hero .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#B9C4BD;margin-bottom:18px;}
.detail-hero h1{color:var(--white);font-size:32px;}
.detail-hero .meta-row{display:flex;gap:26px;margin-top:18px;flex-wrap:wrap;}
.detail-hero .meta-row div .l{font-size:11px;color:#9DAA9D;font-family:var(--font-mono);}
.detail-hero .meta-row div .v{font-size:15px;font-weight:600;margin-top:3px;}
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:36px;}
@media (max-width:900px){.detail-grid{grid-template-columns:1fr;}}
.officials-list .row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);}
.officials-list .row:last-child{border-bottom:0;}
.officials-list .name{font-weight:600;font-size:14.5px;}
.officials-list .desig{font-size:12.5px;color:var(--ink-soft);}
.side-card{padding:20px;}
.side-card h4{font-size:13px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--rust-deep);margin-bottom:14px;}
.side-card .line{display:flex;gap:10px;font-size:13.5px;padding:9px 0;border-top:1px solid var(--line);}
.side-card .line:first-of-type{border-top:0;padding-top:0;}
.side-card .line svg{width:16px;height:16px;flex-shrink:0;color:var(--rust);margin-top:1px;}

.table{width:100%;border-collapse:collapse;font-size:13.5px;}
.table th{text-align:left;font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:11px 16px;border-bottom:1.5px solid var(--line);background:var(--paper-deep);}
.table td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
.table tr:last-child td{border-bottom:0;}
.table tr:hover td{background:#FBFAF6;}
.doc-row{display:flex;align-items:center;gap:12px;}
.doc-ico{width:34px;height:34px;background:var(--forest-mist);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.doc-ico svg{width:16px;height:16px;color:var(--forest);}

.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media (max-width:900px){.gallery-grid{grid-template-columns:repeat(2,1fr);}}
.gphoto{aspect-ratio:4/3;border-radius:5px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-family:var(--font-mono);font-size:11px;text-align:center;padding:10px;position:relative;overflow:hidden;}
.gphoto svg{width:26px;height:26px;margin-bottom:8px;opacity:.85;}
.gphoto .lbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top, rgba(0,0,0,.55), transparent);padding:24px 10px 9px;font-size:11px;text-align:left;color:#fff;}

.charter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.charter-item{background:var(--white);padding:20px 22px;}
.charter-item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.charter-item h4{font-size:14.5px;}
@media (max-width:760px){.charter-grid{grid-template-columns:1fr;}}

.captcha-row{display:flex;align-items:center;gap:10px;}
.captcha-box{font-family:var(--font-mono);background:var(--paper-deep);border:1.5px solid var(--line);border-radius:4px;padding:11px 16px;font-size:16px;letter-spacing:.08em;font-weight:600;user-select:none;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-grid.full{grid-template-columns:1fr;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%;border:1.5px solid var(--line);border-radius:4px;padding:11px 13px;font-family:inherit;font-size:14px;background:var(--white);
}
.field textarea{resize:vertical;min-height:90px;}
@media (max-width:680px){.form-grid{grid-template-columns:1fr;}}

.map-block{height:230px;border-radius:6px;background:
  linear-gradient(135deg, #DDE6DE 25%, transparent 25%) -10px 0/ 22px 22px,
  linear-gradient(225deg, #DDE6DE 25%, transparent 25%) -10px 0/ 22px 22px,
  linear-gradient(315deg, #DDE6DE 25%, transparent 25%) 0px 0/ 22px 22px,
  linear-gradient(45deg, #DDE6DE 25%, var(--forest-mist) 25%) 0px 0/ 22px 22px;
  position:relative;border:1px solid var(--line);
}
.map-pin{position:absolute;left:50%;top:46%;transform:translate(-50%,-100%);}
.map-pin svg{width:34px;height:34px;color:var(--rust);filter:drop-shadow(0 4px 6px rgba(0,0,0,.25));}
.map-tag{position:absolute;bottom:14px;left:14px;background:var(--white);padding:8px 12px;border-radius:4px;font-size:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);}

footer.site-footer{background:var(--iron);color:#B7B3A4;padding:54px 0 26px;margin-top:30px;}
.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:36px;}
.footer-grid h5{color:#E9E5D6;font-size:13px;font-family:var(--font-mono);letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;}
.footer-grid li{margin-bottom:9px;font-size:13.5px;}
.footer-grid li a:hover{color:#fff;text-decoration:underline;}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #3A3E33;margin-top:40px;padding-top:22px;font-size:12px;flex-wrap:wrap;gap:10px;}
.social-row{display:flex;gap:10px;}
.social-row a{width:30px;height:30px;border:1px solid #45493F;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.social-row a:hover{border-color:#E7A33E;color:#E7A33E;}
@media (max-width:900px){.footer-grid{grid-template-columns:1fr 1fr;}}

/* ===== LOGIN SCREEN ===== */
.login-shell{min-height:100vh;display:flex;}
.login-side{flex:1.1;background:var(--forest-deep);color:#fff;padding:60px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
.login-side::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 2px, transparent 2px 56px);}
.login-side .top{position:relative;}
.login-side h2{color:#fff;font-size:30px;max-width:380px;margin-top:26px;}
.login-side p{color:#B9C4BD;margin-top:14px;max-width:360px;font-size:14.5px;}
.login-side .feat{display:flex;gap:12px;margin-top:16px;align-items:flex-start;}
.login-side .feat svg{width:18px;height:18px;color:#E7A33E;margin-top:2px;flex-shrink:0;}
.login-side .feat p{margin:0;color:#D9E3DC;font-size:13.5px;}
.login-main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;background:var(--paper);}
.login-box{width:100%;max-width:380px;}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:22px 0 26px;}
.role-tab{border:1.5px solid var(--line);border-radius:6px;padding:14px;text-align:left;background:var(--white);}
.role-tab.active{border-color:var(--forest);background:var(--forest-mist);}
.role-tab .l{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;}
.role-tab .n{font-weight:700;font-size:14px;margin-top:3px;}
.demo-note{background:var(--rust-mist);border:1px solid #E7C5AC;border-radius:5px;padding:12px 14px;font-size:12.5px;color:var(--rust-deep);margin-top:18px;display:flex;gap:10px;}
@media (max-width:880px){.login-side{display:none;}}

/* ===== PORTAL SHELL ===== */
.portal{display:flex;min-height:100vh;background:var(--paper);}
.sidebar{width:248px;background:var(--iron);color:#C9C5B6;flex-shrink:0;display:flex;flex-direction:column;}
.sb-brand{display:flex;align-items:center;gap:11px;padding:22px 20px;border-bottom:1px solid #34382E;}
.sb-brand .mark{width:34px;height:34px;flex-shrink:0;}
.sb-brand b{color:#fff;font-size:13.5px;display:block;line-height:1.2;}
.sb-brand small{color:#8C9180;font-size:10.5px;}
.sb-section{padding:16px 14px 4px;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#6F7464;}
.sb-link{display:flex;align-items:center;gap:11px;padding:10px 14px;margin:1px 8px;border-radius:5px;font-size:13.5px;font-weight:500;color:#C9C5B6;}
.sb-link svg{width:17px;height:17px;flex-shrink:0;opacity:.8;}
.sb-link:hover{background:#2C3026;color:#fff;}
.sb-link.active{background:var(--forest);color:#fff;}
.sb-link.active svg{opacity:1;}
.sb-badge{margin-left:auto;background:var(--rust);color:#fff;font-size:10px;font-family:var(--font-mono);padding:1px 6px;border-radius:10px;}
.sb-foot{margin-top:auto;padding:16px;border-top:1px solid #34382E;display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--rust);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.sb-foot .who{flex:1;min-width:0;}
.sb-foot .who b{display:block;font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-foot .who span{font-size:11px;color:#8C9180;}
.sb-foot button{background:transparent;border:1px solid #45493F;color:#C9C5B6;border-radius:4px;padding:6px;}
.sb-foot button:hover{border-color:var(--rust);color:#fff;}

.portal-main{flex:1;min-width:0;}
.topbar{height:64px;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;}
.topbar h2{font-size:18px;}
.topbar-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;font-family:var(--font-mono);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.tb-icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;position:relative;background:var(--white);}
.tb-icon-btn svg{width:17px;height:17px;color:var(--ink-soft);}
.tb-icon-btn .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--rust);}
.portal-content{padding:28px;max-width:1320px;}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
@media (max-width:1100px){.kpi-grid{grid-template-columns:1fr 1fr;}}
.kpi{padding:20px;}
.kpi .top{display:flex;justify-content:space-between;align-items:flex-start;}
.kpi .ic{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.kpi .ic svg{width:18px;height:18px;}
.kpi .num{font-family:var(--font-mono);font-size:27px;font-weight:600;margin-top:14px;}
.kpi .lab{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.kpi .delta{font-size:11.5px;font-weight:600;margin-top:8px;display:inline-block;}

.panel-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:start;}
@media (max-width:1000px){.panel-grid{grid-template-columns:1fr;}}
.panel{overflow:hidden;}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:17px 20px;border-bottom:1px solid var(--line);}
.panel-head h3{font-size:14.5px;}
.alert-row{display:flex;gap:12px;padding:13px 20px;border-bottom:1px solid var(--line);}
.alert-row:last-child{border-bottom:0;}
.alert-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.alert-row p{font-size:13.5px;}
.alert-row .t{font-size:11px;color:var(--ink-soft);margin-top:2px;font-family:var(--font-mono);}

.bw-progress{height:6px;background:var(--paper-deep);border-radius:6px;overflow:hidden;margin-top:7px;}
.bw-progress > div{height:100%;background:var(--forest);}

.action-card{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:6px;background:var(--white);}
.action-card .ic{width:38px;height:38px;border-radius:7px;background:var(--forest-mist);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.action-card .ic svg{width:18px;height:18px;color:var(--forest);}
.action-card h5{font-size:13.5px;}
.action-card p{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media (max-width:600px){.action-grid{grid-template-columns:1fr;}}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:14px;flex-wrap:wrap;}
.tabbar{display:flex;gap:4px;background:var(--paper-deep);padding:4px;border-radius:6px;width:fit-content;margin-bottom:18px;}
.tabbar button{background:transparent;border:0;padding:8px 16px;font-size:13px;font-weight:600;border-radius:4px;color:var(--ink-soft);}
.tabbar button.active{background:var(--white);color:var(--forest);box-shadow:0 1px 3px rgba(0,0,0,.08);}

.empty-state{padding:60px 30px;text-align:center;color:var(--ink-soft);}
.empty-state svg{width:36px;height:36px;margin:0 auto 14px;opacity:.4;}

textarea.notes{width:100%;border:1.5px solid var(--line);border-radius:4px;padding:9px 11px;font-family:inherit;font-size:13px;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--iron);color:#fff;padding:13px 22px;border-radius:6px;font-size:13.5px;display:flex;align-items:center;gap:10px;z-index:600;box-shadow:0 10px 30px rgba(0,0,0,.3);}
.toast svg{width:16px;height:16px;color:#7CC78A;}
</style>

        <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Module</th><th>IP Address</th></tr></thead>
        <tbody>
          ${AUDIT.map(a=>`<tr>
            <td style="font-family:var(--font-mono);font-size:12px;">${a.time}</td>
            <td style="font-size:12.5px;">${a.user}</td>
            <td>${a.action}</td>
            <td style="color:var(--ink-soft);">${a.module}</td>
            <td style="font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);">${a.ip}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  `, "Audit Log", "Complete, immutable record of all portal activity");
}

        <div class="line">${ICN.shield}<span>SSL/TLS certificate — Valid until Aug 2027</span></div>

      <div class="card side-card"><h4>Backup &amp; Continuity</h4>

      </div>
    </div>
  `, "Settings", "System configuration & compliance status");

/* ===== JAIL OFFICER ===== */
function screenJailDashboard(){
  const myJail="Birsa Munda Central Jail";
  const myQueue=CONTENT_QUEUE.filter(c=>c.jail===myJail);
  return portalShell(`
    <div class="kpi-grid">
      <div class="card kpi"><div class="top"><div class="ic" style="background:var(--forest-mist);color:var(--forest);">${ICN.doc}</div></div><div class="num">${myQueue.filter(c=>c.status==='Approved').length}</div><div class="lab">Published items</div></div>
      <div class="card kpi"><div class="top"><div class="ic" style="background:#FBF0DD;color:var(--amber);">${ICN.clock}</div></div><div class="num">${myQueue.filter(c=>c.status==='Pending').length}</div><div class="lab">Awaiting PHQ approval</div></div>
      <div class="card kpi"><div class="top"><div class="ic" style="background:var(--forest-mist);color:var(--forest);">${ICN.image}</div></div><div class="num">24</div><div class="lab">Gallery photos live</div></div>
      <div class="card kpi"><div class="top"><div class="ic" style="background:#F6E3DF;color:var(--red);">${ICN.alert}</div></div><div class="num">${GRIEVANCES.filter(g=>g.jail===myJail).length}</div><div class="lab">Open grievances</div></div>
    </div>
    <div class="action-grid" style="margin-bottom:24px;">
      <div class="action-card" style="cursor:pointer;" onclick="S.jailEditorTab='circulars';nav('jail-editor');"><div class="ic">${ICN.plus}</div><div><h5>Add a circular</h5><p>Submit for PHQ approval</p></div></div>
      <div class="action-card" style="cursor:pointer;" onclick="S.jailEditorTab='gallery';nav('jail-editor');"><div class="ic">${ICN.upload}</div><div><h5>Upload gallery photos</h5><p>Document an event or activity</p></div></div>
      <div class="action-card" style="cursor:pointer;" onclick="S.jailEditorTab='officials';nav('jail-editor');"><div class="ic">${ICN.users}</div><div><h5>Update officials list</h5><p>Keep contact details current</p></div></div>
      <div class="action-card" style="cursor:pointer;" onclick="nav('jail-grievance');"><div class="ic">${ICN.alert}</div><div><h5>Respond to grievances</h5><p>Reply to citizen concerns</p></div></div>
    </div>
    <div class="card panel">
      <div class="panel-head"><h3>My submissions</h3></div>
      ${myQueue.map(c=>`<div class="alert-row">
        <div class="alert-dot" style="background:${c.status==='Approved'?'var(--forest)':c.status==='Rejected'?'var(--red)':'var(--amber)'};"></div>
        <div style="flex:1;"><p><b>${c.title}</b></p><div class="t">${c.type} · submitted ${c.date}</div></div>
        <span class="tag ${c.status==='Pending'?'tag-amber':c.status==='Approved'?'tag-green':'tag-red'}">${c.status}</span>
      </div>`).join("")}
    </div>
  `, "Dashboard", "Birsa Munda Central Jail · Jail Officer Console");
}

function screenJailEditor(){
  const tabs=[["officials","Officials"],["gallery","Gallery"],["circulars","Circulars"],["events","Events"]];
  return portalShell(`
    <div class="tabbar">${tabs.map(([id,lab])=>`<button class="${S.jailEditorTab===id?'active':''}" onclick="S.jailEditorTab='${id}';render();">${lab}</button>`).join("")}</div>
    <div class="card" style="padding:26px;">
      ${jailEditorBody()}
    </div>
  `, "Page Editor", "Birsa Munda Central Jail — changes route through Change Control before going live");
}
function jailEditorBody(){
  if(S.jailEditorTab==="officials"){
    return `<h3 style="font-size:16px;margin-bottom:18px;">Facility officials</h3>
    <div class="form-grid" style="margin-bottom:16px;">
      <div class="field"><label>Name</label><input value="Shri R. K. Mahto"></div>
      <div class="field"><label>Designation</label><input value="Superintendent"></div>
    </div>
    <div class="form-grid" style="margin-bottom:20px;">
      <div class="field"><label>Phone</label><input value="0651-2233012"></div>
      <div class="field"><label>Email</label><input value="cj.ranchi@prisons.jharkhand.gov.in"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="submitForApproval()">Submit for Approval</button>`;
  }
  if(S.jailEditorTab==="gallery"){
    return `<h3 style="font-size:16px;margin-bottom:18px;">Upload photographs</h3>
    <div style="border:2px dashed var(--line);border-radius:6px;padding:40px;text-align:center;color:var(--ink-soft);margin-bottom:18px;">
      ${ICN.upload}<p style="margin-top:10px;font-size:13.5px;">Drag photos here, or click to browse · JPG/PNG, max 5MB each</p>
    </div>
    <div class="field" style="margin-bottom:18px;"><label>Caption</label><input placeholder="e.g. Vocational training workshop, June 2026"></div>
    <button class="btn btn-primary btn-sm" onclick="submitForApproval()">Submit for Approval</button>`;
  }
  if(S.jailEditorTab==="circulars"){
    return `<h3 style="font-size:16px;margin-bottom:18px;">New circular</h3>
    <div class="field" style="margin-bottom:16px;"><label>Title</label><input placeholder="e.g. Revised mulakat timing — June 2026"></div>
    <div class="field" style="margin-bottom:20px;"><label>Details</label><textarea placeholder="Circular content…"></textarea></div>
    <button class="btn btn-primary btn-sm" onclick="submitForApproval()">Submit for Approval</button>`;
  }
  return `<h3 style="font-size:16px;margin-bottom:18px;">New event report</h3>
  <div class="form-grid" style="margin-bottom:16px;">
    <div class="field"><label>Event title</label><input placeholder="e.g. Yoga Day observance"></div>
    <div class="field"><label>Date</label><input type="date"></div>
  </div>
  <div class="field" style="margin-bottom:20px;"><label>Summary</label><textarea placeholder="What happened…"></textarea></div>
  <button class="btn btn-primary btn-sm" onclick="submitForApproval()">Submit for Approval</button>`;
}
function submitForApproval(){ toast("Submitted to PHQ for approval"); nav("jail-dashboard"); }

function screenJailGrievance(){
  const mine=GRIEVANCES.filter(g=>g.jail.includes("Ranchi"));
  return portalShell(`
    <div class="card" style="overflow:hidden;">
      <table class="table">
        <thead><tr><th>Complainant</th><th>Category</th><th>Date</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${mine.length ? mine.map(g=>`<tr><td><b>${g.name}</b></td><td>${g.cat}</td><td>${g.date}</td><td><span class="tag ${g.status==='Resolved'?'tag-green':'tag-amber'}">${g.status}</span></td><td><button class="btn btn-ghost btn-sm">Reply</button></td></tr>`).join("") : `<tr><td colspan="5"><div class="empty-state">${ICN.check}<p>No open grievances for your facility.</p></div></td></tr>`}
        </tbody>
      </table>
    </div>
  `, "Grievances", "Birsa Munda Central Jail");
}

/* =========================================================
   GLOBAL HELPERS
========================================================= */
function toggleLang(){ S.lang = S.lang==="en" ? "hi" : "en"; render(); }
function changeFontSize(d){
  S.fontStep = d===0 ? 1 : Math.max(0, Math.min(2, S.fontStep+d));
  const sizes=[14,16,18];
  document.documentElement.style.fontSize = sizes[S.fontStep]+"px";
}

/* =========================================================
   ROUTER / RENDER
========================================================= */
function render(){
  const app=document.getElementById("app");
  if(S.screen==="login"){ app.innerHTML = screenLogin(); return; }
  if(S.screen==="public-preview"){ S.mode="public"; S.screen="home"; }

  if(S.mode==="public" && S.screen!=="login" && !["admin-dashboard","admin-content","admin-users","admin-grievances","admin-audit","settings","jail-dashboard","jail-editor","jail-grievance"].includes(S.screen)){
    let content="";
    switch(S.screen){
      case "home": content=screenHome(); break;
      case "about": content=screenAbout(); break;
      case "jails": content=screenJails(); break;
      case "jail-detail": content=screenJailDetail(); break;
      case "acts": content=screenActsRules(); break;
      case "tenders": content=screenTenders(); break;
      case "gallery": content=screenGallery(); break;
      case "charter": content=screenCharter(); break;
      case "contact": content=screenContact(); break;
      default: content=screenHome();
    }
    app.innerHTML = renderPublic(content);
    return;
  }

  // portal screens
  switch(S.screen){
    case "admin-dashboard": app.innerHTML=screenAdminDashboard(); break;
    case "admin-content": app.innerHTML=screenAdminContent(); break;
    case "admin-users": app.innerHTML=screenAdminUsers(); break;
    case "admin-grievances": app.innerHTML=screenAdminGrievances(); break;
    case "admin-audit": app.innerHTML=screenAdminAudit(); break;
    case "settings": app.innerHTML=screenSettings(); break;
    case "jail-dashboard": app.innerHTML=screenJailDashboard(); break;
    case "jail-editor": app.innerHTML=screenJailEditor(); break;
    case "jail-grievance": app.innerHTML=screenJailGrievance(); break;
    case "jails": app.innerHTML = S.mode==="portal" ? portalShell(screenJailsInline(), "Jails Directory", "Read-only reference for PHQ Admin") : renderPublic(screenJails()); break;
    default: app.innerHTML=screenAdminDashboard();
  }
}
function screenJailsInline(){
  return `<div class="jail-grid">${JAILS.map(j=>`<div class="jail-card" onclick="alert('Profile editing opens in the jail officer console.')"><div class="swatch"><div class="ico">${ICN.building}</div></div><div class="body"><div class="type">${j.type} · ${j.district}</div><h4>${j.name}</h4><div class="meta"><span>Occ. ${j.occ}/${j.capacity}</span><span>${j.updated}</span></div></div></div>`).join("")}</div>`;
}

render();
</script>
